# =============================================================
# PIPELINE PRINCIPAL: TechMarket CI/CD
# Versión: v1.1.0
# Descripción: Orquesta build, test, infra y deploy
# =============================================================

name: TechMarket CI/CD Pipeline

on:
  push:
    branches:
      - main
      - staging
      - develop
  pull_request:
    branches:
      - main
      - staging

jobs:
  # ============================================================
  # JOB 1: BUILD
  # ============================================================
  build:
    name: Build
    uses: ./.github/workflows/template_build.yml
    with:
      node-version: "18"
      working-directory: "."
      artifact-name: "techmarket-build"
      environment: ${{ github.ref_name == 'main' && 'prod' || github.ref_name == 'staging' && 'staging' || 'dev' }}
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ============================================================
  # JOB 2: TEST
  # ============================================================
  test:
    name: Test
    needs: build
    uses: ./.github/workflows/template_test.yml
    with:
      node-version: "18"
      working-directory: "."
      artifact-name: "techmarket-build"
      coverage-threshold: "80"
      environment: ${{ github.ref_name == 'main' && 'prod' || github.ref_name == 'staging' && 'staging' || 'dev' }}
      run-integration-tests: ${{ github.ref_name == 'main' || github.ref_name == 'staging' }}

  # ============================================================
  # JOB 3: INFRAESTRUCTURA (Terraform - crea ECR)
  # Solo en main y staging
  # ============================================================
  infra:
    name: Infraestructura
    needs: test
    if: github.ref_name == 'main' || github.ref_name == 'staging'
    uses: ./.github/workflows/template_infra.yml
    with:
      environment: ${{ github.ref_name == 'main' && 'prod' || 'staging' }}
      aws_region: "us-east-1"
      terraform_dir: "infra/ecr"
      action: "apply"
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}

  # ============================================================
  # JOB 4: DEPLOY
  # Depende de que la infra esté lista
  # ============================================================
  deploy:
    name: Deploy
    needs: [build, test, infra]
    if: github.ref_name == 'main' || github.ref_name == 'staging'
    uses: ./.github/workflows/template_deploy.yml
    with:
      environment: ${{ github.ref_name == 'main' && 'prod' || 'staging' }}
      artifact-name: "techmarket-build"
      aws-region: "us-east-1"
      ecr-repository: "techmarket-app"
      ecs-cluster: "techmarket-cluster"
      ecs-service: "techmarket-service"
      image-tag: ${{ github.sha }}
      node-version: "18"
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
