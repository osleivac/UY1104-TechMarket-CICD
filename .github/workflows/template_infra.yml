# =============================================================
# PLANTILLA REUTILIZABLE: INFRAESTRUCTURA (Terraform)
# Versión: v1.1.0
# =============================================================

name: Template Infra

on:
  workflow_call:
    inputs:
      environment:
        description: "Entorno de despliegue"
        required: true
        type: string
      aws_region:
        description: "Region de AWS"
        required: false
        type: string
        default: "us-east-1"
      terraform_dir:
        description: "Directorio de Terraform"
        required: false
        type: string
        default: "infra/ecr"
      action:
        description: "Accion de Terraform: apply o destroy"
        required: false
        type: string
        default: "apply"
    outputs:
      repository_url:
        description: "URL del repositorio ECR creado"
        value: ${{ jobs.terraform.outputs.repository_url }}
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      AWS_SESSION_TOKEN:
        required: false

jobs:
  terraform:
    name: "Terraform - ${{ inputs.environment }}"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    outputs:
      repository_url: ${{ steps.tf_output.outputs.repository_url }}

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ${{ inputs.terraform_dir }}
        run: terraform init

      - name: Terraform Validate
        working-directory: ${{ inputs.terraform_dir }}
        run: terraform validate

      # Importar ECR si ya existe para evitar conflicto
      - name: Importar ECR existente si aplica
        working-directory: ${{ inputs.terraform_dir }}
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGION="${{ inputs.aws_region }}"
          REPO="techmarket-app"

          # Verificar si el repositorio existe en AWS
          if aws ecr describe-repositories --repository-names $REPO --region $REGION 2>/dev/null; then
            echo "ECR existe, verificando estado de Terraform..."

            # Verificar si ya está en el estado de Terraform
            if ! terraform state show aws_ecr_repository.techmarket 2>/dev/null; then
              echo "Importando ECR al estado de Terraform..."
              terraform import aws_ecr_repository.techmarket $REPO
            else
              echo "ECR ya esta en el estado de Terraform"
            fi
          else
            echo "ECR no existe, se creara en el apply"
          fi

      - name: Terraform Plan
        working-directory: ${{ inputs.terraform_dir }}
        run: |
          terraform plan \
            -var="environment=${{ inputs.environment }}" \
            -var="aws_region=${{ inputs.aws_region }}" \
            -out=tfplan

      - name: Terraform Apply
        if: inputs.action == 'apply'
        working-directory: ${{ inputs.terraform_dir }}
        run: terraform apply -auto-approve tfplan

      - name: Obtener outputs
        id: tf_output
        if: inputs.action == 'apply'
        working-directory: ${{ inputs.terraform_dir }}
        run: |
          REPO_URL=$(terraform output -raw repository_url)
          echo "repository_url=$REPO_URL" >> $GITHUB_OUTPUT
          echo "ECR Repository URL: $REPO_URL"
